name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test · node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['26']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      # Cambium is zero-dependency (Node v26 runs the TypeScript natively), so there is nothing
      # to install — `npm test` runs `node --test` over the .mjs + native .ts suites directly.
      - name: Test
        run: npm test
